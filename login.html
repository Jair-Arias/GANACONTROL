<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión - GanaControl</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="relative h-screen flex items-center justify-center">

  <!-- Fondo -->
  <div class="absolute inset-0">
    <img src="img/fondo-login.jpeg" class="w-full h-full object-cover">
  </div>

  <!-- Logo arriba izquierda -->
  <div class="absolute top-4 left-4">
    <img src="img/logo.jpeg" alt="Logo GanaControl" 
         class="w-16 h-16 rounded-full shadow-lg border-2 border-white">
  </div>

  <!-- Contenedor principal estilo Figma -->
  <div class="relative bg-black/50 backdrop-blur-lg p-10 rounded-2xl shadow-2xl w-96 border border-white/10">
    <!-- Icono usuario -->
    <div class="flex justify-center mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" 
           class="h-16 w-16 text-white opacity-90" 
           fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M5.121 17.804A13.937 13.937 0 0112 15c2.485 0 
                 4.77.755 6.879 2.046M15 10a3 3 0 
                 11-6 0 3 3 0 016 0z" />
      </svg>
    </div>

    <!-- Título -->
    <h2 class="text-2xl font-bold text-center text-white mb-6 drop-shadow-lg">Iniciar Sesión</h2>

    <!-- Formulario con id -->
    <form id="loginForm" class="flex flex-col gap-4">
      <input type="email" placeholder="Correo Electrónico" 
             class="px-4 py-2 rounded-full border border-white/30 bg-white/10 text-white placeholder-gray-200 focus:outline-none focus:ring-2 focus:ring-green-400">

      <input type="password" placeholder="Contraseña" 
             class="px-4 py-2 rounded-full border border-white/30 bg-white/10 text-white placeholder-gray-200 focus:outline-none focus:ring-2 focus:ring-green-400">

      <button type="submit"         
              class="px-6 py-2 rounded-full bg-green-600 text-white font-semibold hover:bg-green-700 transition">
        Iniciar Sesión
      </button>
    </form>

    <!-- Subtítulo -->
    <p class="mt-4 text-center text-sm text-gray-200 italic">¡Tu vaquero virtual!</p>

    <!-- Link a registro -->
    <p class="mt-2 text-sm text-center text-gray-300">
      ¿No tienes cuenta? 
      <a href="register.html" class="text-green-400 font-semibold hover:underline">Regístrate aquí</a>
    </p>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
