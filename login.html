<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión - GanaControl</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="relative min-h-screen flex flex-col">

  <!-- Fondo -->
  <div class="fixed inset-0 -z-10">
    <img src="img/fondo-login.jpeg" 
         class="w-full h-full object-cover brightness-75 blur-sm">
  </div>

  <!-- Logo -->
  <div class="absolute top-4 left-4 z-10">
    <img src="img/logo.jpeg" 
         class="w-16 h-16 rounded-full shadow-lg border-2 border-white">
  </div>

  <!-- Card -->
  <div class="flex-1 flex items-center justify-center px-4">
    <div class="bg-black/60 backdrop-blur-md p-10 rounded-3xl shadow-2xl w-full max-w-sm border border-white/20">

      <h2 class="text-3xl font-bold text-center text-green-500 mb-8">
        Iniciar Sesión
      </h2>

      <form id="loginForm" class="flex flex-col gap-5">

        <input 
          type="email"
          name="email"
          required
          placeholder="Correo Electrónico"
          class="px-5 py-3 rounded-full bg-white/10 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-green-400">

        <input 
          type="password"
          name="password"
          required
          minlength="6"
          placeholder="Contraseña"
          class="px-5 py-3 rounded-full bg-white/10 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-green-400">

        <button 
          type="submit"
          class="px-6 py-3 rounded-full bg-green-600 hover:bg-green-700 text-white font-semibold transition transform hover:-translate-y-1">
          Iniciar Sesión
        </button>

        <p id="loginError" class="text-red-400 text-sm text-center hidden"></p>

      </form>

      <p class="mt-6 text-sm text-center text-gray-300">
        ¿No tienes cuenta?
        <a href="register.html" class="text-green-400 font-semibold hover:underline">
          Regístrate aquí
        </a>
      </p>

    </div>
  </div>

  <footer class="text-white text-center py-4">
    &copy; 2025 GanaControl
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
