<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión - GanaControl</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="relative min-h-screen flex flex-col">

  <!-- Fondo difuminado -->
  <div class="fixed inset-0 z-[-10]">
    <img src="img/fondo-login.jpeg" alt="Fondo GanaControl" 
         class="w-full h-full object-cover filter brightness-75 blur-sm">
  </div>

  <!-- Logo arriba izquierda -->
  <div class="absolute top-4 left-4 z-10">
    <img src="img/logo.jpeg" alt="Logo GanaControl" 
         class="w-16 h-16 rounded-full shadow-lg border-2 border-white">
  </div>

  <!-- Contenedor principal centrado -->
  <div class="relative z-10 flex-1 flex items-center justify-center px-4 mt-10">
    <div class="bg-black/50 backdrop-blur-md p-12 rounded-3xl shadow-2xl w-full max-w-sm border border-white/20">
      
      <!-- Icono usuario -->
      <div class="flex justify-center mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" 
             class="h-16 w-16 text-white opacity-90" 
             fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                d="M5.121 17.804A13.937 13.937 0 0112 15c2.485 0 
                   4.77.755 6.879 2.046M15 10a3 3 0 
                   11-6 0 3 3 0 016 0z" />
        </svg>
      </div>
      
      <!-- Título -->
      <h2 class="text-3xl font-bold text-center text-green-700 mb-8 drop-shadow-lg">Iniciar Sesión</h2>
      
      <!-- Formulario -->
      <form id="loginForm" class="flex flex-col gap-5">
        <input type="email" placeholder="Correo Electrónico" 
               class="px-5 py-3 rounded-full border border-white/30 bg-white/10 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-green-400 transition">

        <input type="password" placeholder="Contraseña" 
               class="px-5 py-3 rounded-full border border-white/30 bg-white/10 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-green-400 transition">

        <button type="submit"         
                class="px-6 py-3 rounded-full bg-green-700 text-white font-semibold shadow-md hover:bg-green-800 transition transform hover:-translate-y-0.5">
          Iniciar Sesión
        </button>
      </form>
      
      <!-- Subtítulo -->
      <p class="mt-6 text-center text-sm text-gray-300 italic">¡Tu vaquero virtual!</p>
      
      <!-- Link a registro -->
      <p class="mt-2 text-sm text-center text-gray-300">
        ¿No tienes cuenta? 
        <a href="register.html" class="text-green-400 font-semibold hover:underline">Regístrate aquí</a>
      </p>
    </div>
  </div>

  <!-- Footer transparente al final -->
  <footer class="w-full text-white text-center py-6 mt-auto z-10">
    &copy; 2025 GanaControl - Todos los derechos reservados
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
