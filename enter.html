<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Entrada - GanaControl</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="relative h-screen flex items-center justify-center">

  <!-- Fondo con blur -->
  <div class="absolute inset-0">
    <img src="img/fondo-enter.jpeg" alt="Fondo GanaControl" 
         class="w-full h-full object-cover blur-sm">
  </div>

  <!-- Contenedor principal -->
  <div class="relative bg-white/80 backdrop-blur-sm p-10 rounded-2xl shadow-xl text-center w-96">
    <!-- Logo -->
    <img src="img/logo.jpeg" alt="Logo GanaControl" class="w-20 mx-auto mb-4 rounded-full">
    
    <!-- Título -->
    <h1 class="text-2xl font-bold mb-2">GanaControl</h1>
    <p class="text-gray-700 mb-6">Tu ganado, bajo control.</p>
    
    <!-- Botones -->
    <div class="flex flex-col gap-4">
      <a href="register.html" 
         class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
         Crear Cuenta
      </a>
      
      <a href="login.html" 
         class="px-6 py-2 bg-white border border-green-600 text-green-700 rounded-lg hover:bg-green-50 transition">
         Iniciar Sesión
      </a>
    </div>

    <!-- Footer -->
    <p class="mt-6 text-sm text-gray-600">Gracias por ser parte de <span class="font-semibold">GanaControl</span></p>
  </div>

  <script src="js/app.js"></script>  
</body>
</html>
