<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro - GanaControl</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="relative min-h-screen flex flex-col">

  <!-- Fondo -->
  <div class="fixed inset-0 -z-10">
    <img src="img/fondo-register.jpeg" 
         class="w-full h-full object-cover brightness-75 blur-sm">
  </div>

  <!-- Logo -->
  <div class="absolute top-6 left-6 z-10">
    <img src="img/logo.jpeg" 
         class="h-20 w-20 rounded-full shadow-lg border-2 border-white">
  </div>

  <!-- Contenido -->
  <div class="flex-1 flex items-center justify-center px-6">
    <div class="bg-black/60 backdrop-blur-md rounded-3xl shadow-2xl p-10 w-full max-w-md border border-white/20">

      <h2 class="text-3xl font-bold text-center mb-8 text-green-500">
        Crear Cuenta
      </h2>

      <form id="registerForm" class="flex flex-col gap-5">

        <input 
          type="text"
          name="nombre"
          required
          placeholder="Nombre Completo"
          class="px-5 py-3 rounded-full bg-white/10 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-green-400">

        <input 
          type="email"
          name="email"
          required
          placeholder="Correo Electrónico"
          class="px-5 py-3 rounded-full bg-white/10 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-green-400">

        <input 
          type="password"
          name="password"
          required
          minlength="6"
          placeholder="Contraseña"
          class="px-5 py-3 rounded-full bg-white/10 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-green-400">

        <input 
          type="password"
          name="confirmPassword"
          required
          minlength="6"
          placeholder="Confirmar Contraseña"
          class="px-5 py-3 rounded-full bg-white/10 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-green-400">

        <button 
          type="submit"
          class="px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-full font-semibold transition transform hover:-translate-y-1">
          Registrarse
        </button>

        <p id="registerError" class="text-red-400 text-sm text-center hidden"></p>

      </form>

      <p class="mt-6 text-sm text-center text-gray-300">
        ¿Ya tienes cuenta?
        <a href="login.html" class="text-green-400 font-semibold hover:underline">
          Inicia sesión
        </a>
      </p>

    </div>
  </div>

  <footer class="text-white text-center py-4">
    &copy; 2025 GanaControl
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
